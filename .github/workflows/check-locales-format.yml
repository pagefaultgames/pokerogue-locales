name: Validate locales files for correctness
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  validator-path-filter:
    name: Locales validator path filter
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      all: ${{ steps.filter.outputs.all }}

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          sparse-checkout: |
            README.md
          sparse-checkout-cone-mode: false

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # 4.0.2
        id: filter
        with:
          filters: |
            all:
              - "**/*.json"
              - "!package.json"
              - "!tsconfig.json"
          predicate-quantifier: "every"

  validate-locales-files:
    name: Validate locales files
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: validator-path-filter
    if: ${{ needs.validator-path-filter.outputs.all == 'true' && (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Pontoon:')) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # 6.0.9
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0
        with:
          node-version: 24
          cache: "pnpm"
      
      - name: Install Node.js dependencies
        run: pnpm add @actions/core

      - name: Validate locale keys
        id: check-keys-format
        run: pnpm check-locales-format:keys
        if: ${{ !cancelled() }}

      - name: Validate locale file names
        id: check-file-names
        run: pnpm check-locales-format:files
        if: ${{ !cancelled() }}

      - name: Validate main language keys exist
        id: check-keys-exist
        run: pnpm check-locales-format:missing
        if: ${{ !cancelled() }}
