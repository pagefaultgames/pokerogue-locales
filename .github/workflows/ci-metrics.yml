name: Generate and Deploy Metrics

on:
  push:
    branches:
      - tmp/ci/translation-exporter

permissions:
  contents: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    name: Test files affects metrics
    outputs:
      should_run: ${{ steps.filter.outputs.any_changed }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          # 0 for all history for all branches.
          fetch-depth: 0

      - name: Filter .metricsignore
        id: filter
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files_ignore_from_source_file: .metricsignore

  build-and-deploy:
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install Node.js dependencies
        run: pnpm add @actions/core

      - name: Run Metrics Exporter
        run: pnpm generate-metrics
      
      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: "stats: update translation metrics and README [skip ci]"
          
          file_pattern: 'README.md data-metrics/metrics.json'